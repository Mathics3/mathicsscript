name: mathicsscript (ubuntu)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -qq liblapack-dev llvm-dev asymptote
        python3 -m pip install --upgrade pip
        # We can comment out after next Mathics-Scanner release
        # python -m pip install -e git+https://github.com/Mathics3/mathics-scanner#egg=Mathics-Scanner[full]
        git clone --depth 1 https://github.com/Mathics3/mathics-scanner.git
        cd mathics-scanner/
        pip install -e .
        bash -x admin-tools/make-JSON-tables.sh
        cd ..
    - name: Install mathicsscript
      run: |
        make
    - name: Test mathicsscript
      run: |
        pip3 install pytest
        make check
